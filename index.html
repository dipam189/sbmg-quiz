<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SBM-G Assessment</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans&family=DM+Serif+Display&display=swap" rel="stylesheet"/>

<style>
:root{
--bg:#0c0f1a;--card:#141828;--border:#252d45;
--text:#dde3f4;--muted:#7c86a2;--accent:#5b8dee;
--green:#22c55e;--red:#ef4444;--gold:#f59e0b;
}
body{margin:0;background:var(--bg);color:var(--text);font-family:'DM Sans';display:flex;justify-content:center}
.container{max-width:700px;width:100%;padding:20px}
.card{background:var(--card);padding:20px;border-radius:16px;border:1px solid var(--border);margin-top:20px}
.hidden{display:none}
h1,h2{font-family:'DM Serif Display'}
input{width:100%;padding:10px;border-radius:8px;border:1px solid var(--border);background:#1a1f30;color:#fff}
button{padding:10px;border:none;border-radius:10px;background:var(--accent);color:#fff;cursor:pointer;margin-top:10px}
.opt{padding:10px;border:1px solid var(--border);margin-top:6px;border-radius:10px;cursor:pointer}
.opt:hover{border-color:var(--accent)}
.selected{background:#1f2a4a;border-color:var(--accent)}
.correct{background:#163a2a;border-color:var(--green)}
.wrong{background:#3a1616;border-color:var(--red)}
.top{display:flex;justify-content:space-between;font-size:14px;color:var(--muted)}
</style>
</head>

<body>
<div class="container">

<!-- REGISTER -->
<div id="register" class="card">
<h2>SBM-G Knowledge Assessment</h2>
<input id="name" placeholder="Enter your name"/>
<button onclick="start()">Start</button>
</div>

<!-- QUIZ -->
<div id="quiz" class="card hidden">
<div class="top">
<span id="progress"></span>
<span id="timer"></span>
</div>
<h3 id="question"></h3>
<div id="options"></div>
<button onclick="prev()">Prev</button>
<button onclick="next()">Next</button>
</div>

<!-- RESULT -->
<div id="result" class="card hidden">
<h2 id="score"></h2>
<button onclick="location.reload()">Restart</button>
</div>

<!-- ADMIN -->
<div id="admin" class="card hidden">
<h3>Admin Dashboard</h3>
<button onclick="exportCSV()">Export CSV</button>
<button onclick="clearData()">Clear</button>
<div id="data"></div>
</div>

</div>

<script>
const TOTAL = 25;
const ADMIN_HASH="adf31a54f8249d38ac5a343ae6f5940fa9a981433f93037f606ddce0c9283cbc";
const KEY="sbm_data";

const Q = [
{id:1,q:"Core components of WASH?",o:["ODF only","Water, Sanitation, Hygiene","Only sanitation","Only water"],a:1},
{id:2,q:"ODF Plus includes?",o:["Only toilets","SLWM + cleanliness","Only water","None"],a:1},
{id:3,q:"Correct sequence?",o:["Aspiring → Rising → Model","Model → Rising","Random","None"],a:0},
{id:4,q:"Har Ghar Jal relation?",o:["Same","Independent","Mandatory","None"],a:1},
{id:5,q:"Twin pit is?",o:["Greywater","Blackwater system","Solid waste","None"],a:1},
{id:6,q:"EoDT location?",o:["Start of drain","End of drain","Anywhere","None"],a:1},
{id:7,q:"Foothill EoDT?",o:["Yes","No","Always yes","None"],a:1},
{id:8,q:"EoDT in schools?",o:["Yes","No","Only big schools","None"],a:0},
{id:9,q:"Waste segregation?",o:["2","3","4","Optional"],a:1},
{id:10,q:"Dry waste bin?",o:["Green","Blue","Red","Black"],a:1},
{id:11,q:"Why segregation?",o:["Reduce waste","Avoid contamination","Increase cost","None"],a:1},
{id:12,q:"Plastic reuse?",o:["Roads","Bricks","Both","None"],a:2},
{id:13,q:"Cleaning before shredding?",o:["Rust","Remove dirt","Color","None"],a:1},
{id:14,q:"PWMU electrification?",o:["SBM","15th FC","MGNREGA","Both"],a:1},
{id:15,q:"Geo tagging?",o:["GPS","Photo","Time","All"],a:3},
{id:16,q:"Typology sign?",o:["EE","BDO","GP","Both"],a:1},
{id:17,q:"O&M funding?",o:["SBM","15th FC","MGNREGA","Both"],a:1},
{id:18,q:"User fee?",o:["5-10","20-30","50-100","100+"],a:1},
{id:19,q:"Grievance?",o:["GP→Block→District","GPWSC→BWSC→DWSC","Both","None"],a:1},
{id:20,q:"Vermiwash tank?",o:["Soak pit","Fertilizer liquid","Plastic treatment","None"],a:1},
{id:21,q:"Tank position?",o:["Above","Below","Side","None"],a:1},
{id:22,q:"District Coordinator?",o:["Construct","Supervise","Report","Both"],a:1},
{id:23,q:"Swa Jal Mitra?",o:["Construct","Monitor","Meeting","Both"],a:1},
{id:24,q:"FTK samples?",o:["50","80","100","150"],a:2},
{id:25,q:"FTK parameters?",o:["7","8","9","10"],a:2}
];

let cur=0,ANS={},timer=1200,interval;

// START
function start(){
const name=document.getElementById("name").value;
if(!name){alert("Enter name");return;}
show("quiz");
load();
startTimer();
}

// UI SWITCH
function show(id){
["register","quiz","result","admin"].forEach(x=>document.getElementById(x).classList.add("hidden"));
document.getElementById(id).classList.remove("hidden");
}

// LOAD QUESTION
function load(){
let q=Q[cur];
document.getElementById("question").innerText=q.q;
document.getElementById("progress").innerText=`Q ${cur+1}/${TOTAL}`;
let html="";
q.o.forEach((opt,i)=>{
let cls="opt";
if(ANS[cur]===i) cls+=" selected";
html+=`<div class="${cls}" onclick="pick(${i})">${opt}</div>`;
});
document.getElementById("options").innerHTML=html;
}

// PICK
function pick(i){
ANS[cur]=i;
load();
}

// NAV
function next(){
if(cur<TOTAL-1){cur++;load();}
else finish();
}
function prev(){
if(cur>0){cur--;load();}
}

// TIMER
function startTimer(){
interval=setInterval(()=>{
timer--;
let m=Math.floor(timer/60),s=timer%60;
document.getElementById("timer").innerText=`${m}:${s<10?"0":""}${s}`;
if(timer<=0){clearInterval(interval);finish();}
},1000);
}

// FINISH
function finish(){
clearInterval(interval);
let correct=0;
Q.forEach((q,i)=>{if(ANS[i]===q.a)correct++;});
let pct=Math.round((correct/TOTAL)*100);

show("result");
document.getElementById("score").innerText=`Score: ${correct}/${TOTAL} (${pct}%)`;

save(correct,pct);
}

// STORAGE
function save(score,pct){
let d=JSON.parse(localStorage.getItem(KEY)||"[]");
d.push({score,pct,time:new Date().toLocaleString()});
localStorage.setItem(KEY,JSON.stringify(d));
}

// ADMIN
async function login(){
let pw=prompt("Password");
let h=await sha(pw);
if(h===ADMIN_HASH){show("admin");loadData();}
else alert("Wrong");
}

async function sha(msg){
const buf=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(msg));
return [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,"0")).join("");
}

function loadData(){
let d=JSON.parse(localStorage.getItem(KEY)||"[]");
document.getElementById("data").innerHTML=d.map(x=>`<p>${x.score} (${x.pct}%) - ${x.time}</p>`).join("");
}

function clearData(){localStorage.removeItem(KEY);loadData();}

function exportCSV(){
let d=JSON.parse(localStorage.getItem(KEY)||"[]");
let csv="Score,Percent,Time\n";
d.forEach(x=>csv+=`${x.score},${x.pct},${x.time}\n`);
let a=document.createElement("a");
a.href="data:text/csv,"+encodeURIComponent(csv);
a.download="results.csv";
a.click();
}
</script>

</body>
</html>
